<!DOCTYPE html>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,120px);
  gap:30px;
  justify-content:center;
}

.item{
  background:white;
  border-radius:15px;
  padding:15px;
  text-decoration:none;
  color:black;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.item img{
  width:80px;
  height:80px;
  object-fit:contain;
}

.item span{
  display:block;
  margin-top:8px;
  font-size:16px;
}

</style>

</head>

<body>

<div class="grid">

<a class="item"
href="https://www.appsheet.com/start/1d5117ed-1218-45c8-b5a3-6fa4128e1491#view=Add%20New%20Expense">
  <img src="Expenses.png">

</a>

href="https://www.appsheet.com/start/1d5117ed-1218-45c8-b5a3-6fa4128e1491#view=Add%20New%20Activity">

</a>

href="https://www.appsheet.com/start/1d5117ed-1218-45c8-b5a3-6fa4128e1491#view=Add%20New%20Medicine">
  <img src="Health.png">
  <span>Health</span>
</a>

<a class="item"
href="https://www.appsheet.com/start/1d5117ed-1218-45c8-b5a3-6fa4128e1491#view=Loans">

<a class="item"
href="https://www.appsheet.com/start/1d5117ed-1218-45c8-b5a3-6fa4128e1491#view=Add%20New%20Income">

</html>
