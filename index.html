      border:0.1px solid #c4d4ff;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .icon-circle img{
      width:45px;
      height:45px;
      object-fit:contain;
      display:block;
    }

    .item span{
      display:block;
      margin-top:20px;
      font-size:14px;
      font-weight:500;
      color:#333;
    }
