<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
  font-family:Arial,sans-serif;
  margin:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,120px);
  gap:25px;
  justify-content:center;
}

.item{
  text-decoration:none;
  color:black;
  text-align:center;
}

.item img{
  width:80px;
  height:80px;
  object-fit:contain;
}

.label{
  margin-top:8px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="grid">

<a class="item" href="#">
<img src="Expenses.png">
<div class="label">Expenses</div>
</a>

<a class="item" href="#">
<img src="Activities.png">
<div class="label">Activities</div>
</a>

<a class="item" href="#">
<img src="Health.png">
<div class="label">Health</div>
</a>

<a class="item" href="#">
<img src="Loans.png">
<div class="label">Loans</div>
</a>

<a class="item" href="#">
<img src="Memories.png">
<div class="label">Memories</div>
</a>

<a class="item" href="#">
<img src="About.png">
<div class="label">About</div>
</a>

</div>

</body>
</html>
